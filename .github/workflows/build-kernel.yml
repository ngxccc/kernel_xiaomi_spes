name: 🚀 Build spes Kernel (Dynamic Clang) & Notify Telegram

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  build:
    name: 🛠️ Compile Kernel
    runs-on: ubuntu-24.04 # Updated to 24.04 to match the DevContainer environment
    env:
      OUT_DIR: /mnt/kernel-out
      CCACHE_DIR: /mnt/ccache

    environment: production

    steps:
      - name: 📥 Checkout Source Code
        uses: actions/checkout@main

      - name: 🛠️ Maximize Build Space & Swap
        uses: easimon/maximize-build-space@master
        with:
          swap-size-mb: 4096
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'

      - name: 🧹 Aggressive Disk Cleanup
        run: |
          set -e
          echo "[Before cleanup]"
          df -h
          sudo rm -rf /usr/local/share/boost \
                      /usr/local/lib/android \
                      /opt/hostedtoolcache/CodeQL \
                      /opt/microsoft \
                      /usr/share/swift
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/* /tmp/* /var/tmp/*
          sudo mkdir -p "$OUT_DIR" "$CCACHE_DIR"
          sudo chown -R "$USER:$USER" "$OUT_DIR" "$CCACHE_DIR"
          echo "[After cleanup]"
          df -h

      - name: ⚡ Fast Install LLVM 22
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc

          echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-22 main" | sudo tee /etc/apt/sources.list.d/llvm.list

          sudo bash -c 'echo "Acquire::Queue-Mode \"access\"; Acquire::Retries \"3\"; APT::Color \"1\"; Acquire::Languages \"none\";" > /etc/apt/apt.conf.d/99parallel'

          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            clang-22 lld-22 llvm-22 \
            bc bison flex libssl-dev make gcc-aarch64-linux-gnu python3 ccache

          sudo ln -sf /usr/lib/llvm-22/bin/* /usr/bin/

      - name: 🧠 Setup Ccache
        uses: actions/cache@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ runner.os }}-kernel-clang-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-kernel-clang-

      - name: 🔎 Detect Clang Version
        run: |
          CLANG_VERSION=$(clang --version | head -n1 | sed -E 's/.*version ([0-9]+(\.[0-9]+)*).*/\1/')
          echo "CLANG_VERSION=${CLANG_VERSION}" >> "$GITHUB_ENV"

      - name: 🔥 Start Kernel Compilation (LLVM Mode)
        id: build_step
        continue-on-error: true
        run: |
          export ARCH=arm64
          export SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          export KBUILD_BUILD_USER="n_gxc"
          export KBUILD_BUILD_HOST="Github-Actions"

          # Configure ccache max size
          ccache -M 5G

          # Build using LLVM=1 (Automatically uses clang, ld.lld, llvm-ar, etc.)
          make O=out LLVM=1 vendor/spes-perf_defconfig
          make -j$(nproc --all) O=out LLVM=1 \
               CC="ccache clang" \
               Image.gz-dtb

          # Prepare artifacts for upload
          mkdir -p final_zip
          cp out/arch/arm64/boot/Image.gz-dtb final_zip/

      - name: 📦 Package with AnyKernel3
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git AnyKernel3

          rm -rf AnyKernel3/.git AnyKernel3/README.md

          # Copy kernel image into AnyKernel3
          cp "$OUT_DIR"/arch/arm64/boot/Image.gz-dtb AnyKernel3/

          # sed -i 's/device.name1=magnum/device.name1=spes/g' AnyKernel3/anykernel.sh

          cd AnyKernel3
          zip -r9 "../Spes-Kernel-$(date +'%Y%m%d-%H%M').zip" *
          cd ..

      - name: 📦 Upload Flashable Zip
        uses: actions/upload-artifact@v6
        with:
          name: spes-kernel-flashable
          path: "*.zip"

      - name: 📱 Telegram Notification
        if: always()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          STATUS="${{ steps.build_step.outcome == 'success' && '✅ SUCCESS' || '❌ FAILED' }}"
          shopt -s nullglob
          ZIP_FILES=(*.zip)
          if [ ${#ZIP_FILES[@]} -gt 0 ]; then
            ZIP_NAME="${ZIP_FILES[0]}"
          else
            ZIP_NAME="None"
          fi

          RUN_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          MESSAGE="🚀 <b>Kernel Build Report</b>

          📌 <b>Status:</b> ${STATUS}
          🏗️ <b>Compiler:</b> Clang ${CLANG_VERSION:-unknown}
          📦 <b>Artifact:</b> <code>${ZIP_NAME}</code>
          👤 <b>Built by:</b> ${GITHUB_ACTOR}

          🔗 <a href=\"${RUN_URL}\">Download &amp; Logs</a>"

          curl -sS -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
               -d chat_id="${CHAT_ID}" \
               -d parse_mode="HTML" \
               --data-urlencode text="${MESSAGE}"
