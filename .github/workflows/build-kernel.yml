name: 🚀 Build spes Kernel & Notify Telegram

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  build:
    name: 🛠️ Compile Kernel
    runs-on: ubuntu-24.04 # Updated to 24.04 to match the DevContainer environment
    env:
      OUT_DIR: ${{ github.workspace }}/out
      CCACHE_DIR: ${{ github.workspace }}/ccache
    defaults:
      run:
        working-directory: /home/runner/work/kernel_xiaomi_spes/kernel_xiaomi_spes

    environment: production

    steps:
      - name: 📥 Checkout Source Code
        uses: actions/checkout@main

      - name: 🧹 Aggressive Disk Cleanup
        run: |
          echo "[Before cleanup]"
          df -h
          sudo rm -rf /usr/local/share/boost \
                      /usr/local/lib/android \
                      /opt/hostedtoolcache/CodeQL \
                      /opt/microsoft \
                      /usr/share/swift
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/* /tmp/* /var/tmp/*
          mkdir -p "$OUT_DIR" "$CCACHE_DIR"
          echo "[After cleanup]"
          df -h

      - name: ⚡ Fast Install LLVM 22
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc

          echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-22 main" | sudo tee /etc/apt/sources.list.d/llvm.list

          sudo bash -c 'echo "Acquire::Queue-Mode \"access\"; Acquire::Retries \"3\"; APT::Color \"1\"; Acquire::Languages \"none\";" > /etc/apt/apt.conf.d/99parallel'

          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            clang-22 lld-22 llvm-22 \
            bc bison flex libssl-dev libncurses-dev libelf-dev make gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi python3 ccache

          sudo ln -sf /usr/lib/llvm-22/bin/* /usr/bin/

      - name: 🧠 Setup Ccache
        uses: actions/cache@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ runner.os }}-kernel-clang-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-kernel-clang-

      - name: 🔎 Detect Clang Version
        run: |
          CLANG_VERSION=$(clang --version | head -n1 | sed -E 's/.*version ([0-9]+(\.[0-9]+)*).*/\1/')
          echo "CLANG_VERSION=${CLANG_VERSION}" >> "$GITHUB_ENV"

      - name: 🔥 Start Kernel Compilation (LLVM Mode)
        run: |
          export CCACHE_DIR="$CCACHE_DIR"
          export KBUILD_BUILD_USER="n_gxc"
          export KBUILD_BUILD_HOST="Github-Actions"
          ccache -M 2G >/dev/null
          ccache -o compression=true
          ulimit -n 65535

          ./scripts/build_kernel.sh clean

      - name: 📦 Package with AnyKernel3
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git AnyKernel3
          rm -rf AnyKernel3/.git AnyKernel3/README.md

          if [ -f "$OUT_DIR/arch/arm64/boot/Image.gz-dtb" ]; then
            cp "$OUT_DIR/arch/arm64/boot/Image.gz-dtb" AnyKernel3/
          else
            echo "❌ Error: Not found Image.gz-dtb after build!"
            exit 1
          fi

          cd AnyKernel3
          zip -r9 "../Spes-Kernel-$(date +'%Y%m%d-%H%M').zip" *
          cd ..

      - name: 📦 Upload Flashable Zip
        uses: actions/upload-artifact@v6
        with:
          name: spes-kernel-flashable
          path: "*.zip"

      - name: 📱 Telegram Notification
        if: always()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          STATUS="${{ job.status == 'success' && '✅ SUCCESS' || '❌ FAILED' }}"
          shopt -s nullglob
          ZIP_FILES=(*.zip)
          if [ ${#ZIP_FILES[@]} -gt 0 ]; then
            ZIP_NAME="${ZIP_FILES[0]}"
          else
            ZIP_NAME="None"
          fi

          RUN_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          MESSAGE="🚀 <b>Kernel Build Report</b>

          📌 <b>Status:</b> ${STATUS}
          🏗️ <b>Compiler:</b> Clang ${CLANG_VERSION:-unknown}
          📦 <b>Artifact:</b> <code>${ZIP_NAME}</code>
          👤 <b>Built by:</b> ${GITHUB_ACTOR}

          🔗 <a href=\"${RUN_URL}\">Download &amp; Logs</a>"

          curl -sS -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
               -d chat_id="${CHAT_ID}" \
               -d parse_mode="HTML" \
               --data-urlencode text="${MESSAGE}"
