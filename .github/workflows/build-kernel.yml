name: 🚀 Build spes Kernel (Dynamic Clang) & Notify Telegram

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  build:
    name: 🛠️ Compile Kernel
    runs-on: ubuntu-24.04 # Updated to 24.04 to match the DevContainer environment

    environment: production

    steps:
      - name: 📥 Checkout Source Code
        uses: actions/checkout@main

      - name: 🛠️ Maximize Build Space & Swap
        uses: easimon/maximize-build-space@master
        with:
          swap-size-mb: 4096
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'

      - name: ⚙️ Install LLVM 22 & Dependencies
        run: |
          sudo apt-get update
          # Install essential build dependencies
          sudo apt-get install -y wget lsb-release software-properties-common gnupg bc bison flex \
          libssl-dev libncurses-dev libelf-dev make gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi python3 ccache

          # Fetch the official LLVM installation script
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 22

          # Force symlink so Kbuild detects 'clang', 'ld.lld', etc., instead of versioned names
          sudo ln -sf /usr/lib/llvm-22/bin/* /usr/bin/

      - name: 🧠 Setup Ccache
        uses: actions/cache@v5
        with:
          path: ~/.ccache
          key: ${{ runner.os }}-kernel-clang-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-kernel-clang-

      - name: 🔎 Detect Clang Version
        run: |
          CLANG_VERSION=$(clang --version | head -n1 | sed -E 's/.*version ([0-9]+(\.[0-9]+)*).*/\1/')
          echo "CLANG_VERSION=${CLANG_VERSION}" >> "$GITHUB_ENV"

      - name: 🔥 Start Kernel Compilation (LLVM Mode)
        run: |
          export ARCH=arm64
          export SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          export KBUILD_BUILD_USER="n_gxc"
          export KBUILD_BUILD_HOST="Github-Actions"

          # Configure ccache max size
          ccache -M 5G

          # Build using LLVM=1 (Automatically uses clang, ld.lld, llvm-ar, etc.)
          make O=out LLVM=1 vendor/spes-perf_defconfig
          make -j$(nproc --all) O=out LLVM=1 \
               CC="ccache clang" \
               Image.gz-dtb

          # Prepare artifacts for upload
          mkdir -p final_zip
          cp out/arch/arm64/boot/Image.gz-dtb final_zip/

      - name: 📦 Package with AnyKernel3
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git AnyKernel3

          rm -rf AnyKernel3/.git AnyKernel3/README.md

          # Copy kernel image into AnyKernel3
          cp out/arch/arm64/boot/Image.gz-dtb AnyKernel3/

          # sed -i 's/device.name1=magnum/device.name1=spes/g' AnyKernel3/anykernel.sh

          cd AnyKernel3
          zip -r9 "../Spes-Kernel-$(date +'%Y%m%d-%H%M').zip" *
          cd ..

      - name: 📦 Upload Flashable Zip
        uses: actions/upload-artifact@v6
        with:
          name: spes-kernel-flashable
          path: "*.zip"

      - name: 📱 Telegram Notification
        if: always()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          STATUS="${{ job.status == 'success' && '✅ SUCCESS' || '❌ FAILED' }}"
          shopt -s nullglob
          ZIP_FILES=(*.zip)
          if [ ${#ZIP_FILES[@]} -gt 0 ]; then
            ZIP_NAME="${ZIP_FILES[0]}"
          else
            ZIP_NAME="None"
          fi

          RUN_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          MESSAGE="🚀 <b>Kernel Build Report</b>

          📌 <b>Status:</b> ${STATUS}
          🏗️ <b>Compiler:</b> Clang ${CLANG_VERSION:-unknown}
          📦 <b>Artifact:</b> <code>${ZIP_NAME}</code>
          👤 <b>Built by:</b> ${GITHUB_ACTOR}

          🔗 <a href=\"${RUN_URL}\">Download &amp; Logs</a>"

          curl -sS -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
               -d chat_id="${CHAT_ID}" \
               -d parse_mode="HTML" \
               --data-urlencode text="${MESSAGE}"
