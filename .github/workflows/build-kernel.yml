name: 🚀 Build spes Kernel & Notify Telegram

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Manual trigger FTW
    inputs:
      ksu_submodule_tag:
        description: "KernelSU-Next submodule tag to checkout"
        required: false
        default: "v3.1.0-legacy-susfs"
      build_mode:
        description: "Build mode for scripts/build_kernel.sh"
        type: choice
        required: false
        default: "clean"
        options:
          - clean
          - fast

# Ensure only one job runs at a time for this workflow to avoid cache race conditions
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: 🛠️ Compile Kernel
    runs-on: ubuntu-24.04
    env:
      # Use dynamic workspace variable instead of hardcoded paths
      OUT_DIR: ${{ github.workspace }}/out
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      RESULT_DIR: ${{ github.workspace }}/out/result

    # Removed the hardcoded working-directory. Github sets it to workspace by default.
    environment: production

    steps:
      - name: 📥 Checkout Source Code
        uses: actions/checkout@main
        with:
          submodules: false
          fetch-depth: 0
          fetch-tags: false

      - name: 🔖 Sync KernelSU-Next Via Script
        env:
          KSU_SUBMODULE_TAG: ${{ github.event.inputs.ksu_submodule_tag || 'v3.1.0-legacy-susfs' }}
        run: |
          echo "Cleaning KernelSU-Next"
          bash ./scripts/kernel_su_next_setup.sh --cleanup
          echo "📌 Using KSU tag: ${KSU_SUBMODULE_TAG}"
          bash ./scripts/kernel_su_next_setup.sh "${KSU_SUBMODULE_TAG}" --cleanup
          git -C KernelSU-Next rev-parse --short HEAD

      - name: 🧹 Aggressive Disk Cleanup
        run: |
          echo "🔥 Nuke unnecessary tools to free up space..."
          sudo rm -rf /usr/local/share/boost \
                      /usr/local/lib/android \
                      /opt/hostedtoolcache/CodeQL \
                      /opt/microsoft \
                      /usr/share/swift
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/* /tmp/* /var/tmp/*
          mkdir -p "$OUT_DIR" "$CCACHE_DIR"

      - name: ⚡ Fast Install LLVM Toolchain
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-22 main" | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo bash -c 'echo "Acquire::Queue-Mode \"access\"; Acquire::Retries \"3\"; APT::Color \"1\";" > /etc/apt/apt.conf.d/99parallel'

          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            clang-22 lld-22 llvm-22 bc bison flex libssl-dev libncurses-dev \
            libelf-dev make gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi python3 ccache
          sudo ln -sf /usr/lib/llvm-22/bin/* /usr/bin/

      - name: 🧠 Setup Ccache
        uses: actions/cache@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-kernel-${{ runner.os }}-${{ github.ref_name }}-llvm22
          restore-keys: |
            ccache-kernel-${{ runner.os }}-${{ github.ref_name }}-
            ccache-kernel-${{ runner.os }}-
            ccache-kernel-

      - name: 🔎 Detect Clang Version
        run: |
          CLANG_VERSION=$(clang --version | head -n1 | sed -E 's/.*version ([0-9]+(\.[0-9]+)*).*/\1/')
          echo "CLANG_VERSION=${CLANG_VERSION}" >> "$GITHUB_ENV"

      - name: 🩹 Apply Kernel Patch
        run: |
          shopt -s nullglob
          PATCH_FILES=(kernel-patch/*.patch)
          if [ ${#PATCH_FILES[@]} -eq 0 ]; then
            echo "❌ No patch file found in kernel-patch/"
            exit 1
          fi

          PATCH_FILE="$(ls -1t kernel-patch/*.patch | head -n1)"
          echo "📦 Applying patch: $PATCH_FILE"
          ./scripts/apply_kernel_patch.sh "$PATCH_FILE"

      - name: 🔥 Start Kernel Compilation
        env:
          BUILD_MODE: ${{ github.event.inputs.build_mode || 'clean' }}
        run: |
          export KBUILD_BUILD_USER="n_gxc"
          export KBUILD_BUILD_HOST="Github-Actions"

          # Configure ccache size and ensure relative paths for hit-rate
          ccache -M 5G
          ccache -o compression=true
          ccache -o base_dir=${{ github.workspace }}
          ccache -z # Zero out stats

          ulimit -n 65535
          ./scripts/build_kernel.sh "$BUILD_MODE"

          # Print cache stats after build
          echo "📊 Ccache Stats:"
          ccache -s

      - name: 📦 Upload Flashable Zip
        uses: actions/upload-artifact@v6
        with:
          name: spes-kernel-flashable
          path: ${{ env.RESULT_DIR }}/*.zip

      - name: 📱 Telegram Notification & File Delivery
        if: always()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # 1. Determine build status
          if [ "${{ job.status }}" == "success" ]; then
            STATUS="✅ SUCCESS"
          else
            STATUS="❌ FAILED"
          fi

          shopt -s nullglob
          ZIP_FILES=("$RESULT_DIR"/*.zip)
          if [ ${#ZIP_FILES[@]} -gt 0 ]; then
            ZIP_FILE="${ZIP_FILES[0]}"
            ZIP_NAME="$(basename "$ZIP_FILE")"
          else
            ZIP_FILE=""
            ZIP_NAME="None"
          fi

          RUN_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          MESSAGE="🚀 <b>Kernel Build Report</b>
          📌 <b>Status:</b> ${STATUS}
          🏗️ <b>Compiler:</b> Clang ${CLANG_VERSION:-unknown}
          📦 <b>Artifact:</b> <code>${ZIP_NAME}</code>
          🔗 <a href=\"${RUN_URL}\">View Logs</a>"

          if [ "${{ job.status }}" == "success" ] && [ -n "$ZIP_FILE" ]; then
            curl -sS -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendDocument" \
              -F chat_id="${CHAT_ID}" -F parse_mode="HTML" \
              -F document=@"${ZIP_FILE}" -F caption="$(echo -e "$MESSAGE")"
          else
            curl -sS -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
              -d chat_id="${CHAT_ID}" -d parse_mode="HTML" \
              --data-urlencode text="$(echo -e "$MESSAGE")"
          fi
